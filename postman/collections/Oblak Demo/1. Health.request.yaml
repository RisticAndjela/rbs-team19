$kind: http-request
description: Brza provera da li API radi pre ostatka demo toka.
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Health endpoint vraca 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Health endpoint vraca status ok', function () {
        pm.expect(pm.response.json().status).to.eql('ok');
      });
    language: text/javascript
order: 1000
